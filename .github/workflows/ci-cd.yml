name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    # unlocking environment's secrets
    environment: production

    steps:
      # Pulling down the latest code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setting up Node.js runtime environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # install project dependencies
      - name: Install Dependencies
        run: npm ci

      # Generate Prisma Client BEFORE compiling/linting
      - name: Generate Prisma Client
        run: npx prisma generate

      # Code Quality Checks (Fails pipeline if code is messy or broken)
      - name: Run Linter & Type Check
        run: |
          npm run lint
          npx tsc --noEmit
          npm run test

      # Install Vercel CLI and pull remote configuration
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Compile and Build optimized production assets
      - name: Build Project Assets
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Deploy the prebuilt bundle to Vercel
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}